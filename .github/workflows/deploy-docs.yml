name: deploy-docs
on:
  push:
    branches: [main]
    paths:
      - "course/labs/**"
      - "mkdocs.yml"
      - ".github/workflows/deploy-docs.yml"
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "mkdocs-material==9.*"
      - run: mkdocs gh-deploy --force
